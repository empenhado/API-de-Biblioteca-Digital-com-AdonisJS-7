# docker-compose.yml
services:
  postgres:
    image: postgres:16
    container_name: postgres_adonis
    environment:
      POSTGRES_USER: adonis
      POSTGRES_PASSWORD: senha123
      POSTGRES_DB: adonis_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: